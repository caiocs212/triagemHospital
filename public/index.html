<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./bundle.js"defer></script>
    <link rel="stylesheet" href="./style.css">
    <title>triagem medica</title>
</head>
<body>
    <h1>sistema de triagem medica</h1><br>
    <label for="nome">seu nome: </label>
    <input id="nome"><br>
    <label for="genero">seu genero:</label>
    <select id="genero">
        <option value="M">Masculino</option>
        <option value="F">Feminino</option>
    </select><br>
    <label for="altura">sua altura: </label>
    <input id="altura"><br>
    <label for="peso">seu peso: </label>
    <input id="peso"><br>
    <label for="circCintura">circunferencia cintura: </label>
    <input id="circCintura"><br>
    <label for="circQuadril">circunferencia quadril:</label>
    <input id="circQuadril"><br>
    <button id="cadastrar">cadastrar e calcular</button><br><br>
    <button id="mostrar">mostrar tabela de pacientes</button><br><br>
    <div id="resposta"></div>
</body>
</html>
